<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app">
        <!-- Header with Search -->
        <div class="header">
            <h1>🎵 My Music</h1>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Search songs...">
            </div>
        </div>

        <!-- Now Playing -->
        <div class="now-playing">
            <div class="album-art">
                <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=500" id="cover" alt="Album Art">
                <div class="playing-indicator" id="playing-indicator">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>
            </div>
            <div class="song-info">
                <h2 id="title">Select a song</h2>
                <p id="artist">Music Player Pro</p>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="progress-area">
            <div class="progress-bar" id="progress-bar">
                <div class="progress" id="progress"></div>
                <div class="progress-thumb" id="progress-thumb"></div>
            </div>
            <div class="time">
                <span id="current-time">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <!-- Volume Control -->
        <div class="volume-control">
            <i class="fas fa-volume-down" id="volume-icon"></i>
            <input type="range" id="volume-slider" min="0" max="100" value="80">
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="ctrl-btn" id="shuffle" title="Shuffle"><i class="fas fa-random"></i></button>
            <button class="ctrl-btn" id="prev" title="Previous"><i class="fas fa-step-backward"></i></button>
            <button class="ctrl-btn play-btn" id="play" title="Play/Pause"><i class="fas fa-play"></i></button>
            <button class="ctrl-btn" id="next" title="Next"><i class="fas fa-step-forward"></i></button>
            <button class="ctrl-btn" id="repeat" title="Repeat"><i class="fas fa-redo"></i></button>
        </div>

        <!-- Playlist Section -->
        <div class="playlist-section">
            <div class="playlist-header">
                <h3>Playlist <span id="song-count">(0 songs)</span></h3>
                <button class="clear-btn" id="clear-playlist"><i class="fas fa-trash"></i></button>
            </div>
            <div class="playlist" id="playlist"></div>
        </div>

        <!-- Add Music Button -->
        <div class="add-music-section">
            <label for="file-input" class="add-btn">
                <i class="fas fa-plus"></i> Add More Music
            </label>
            <input type="file" id="file-input" accept="audio/*" multiple style="display: none;">
        </div>
    </div>

    <audio id="audio"></audio>
    <script src="script.js"></script>
</body>
</html>
